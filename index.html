<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Pro Chat</title>
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-hover: #3f3f46;
            --border: #3f3f46;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-secondary: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        .app { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.625rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .new-chat-btn:hover { background: var(--accent-hover); }

        .settings-group {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .settings-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .settings-group input[type="password"],
        .settings-group input[type="text"],
        .settings-group input[type="number"],
        .settings-group textarea,
        .settings-group select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            font-family: inherit;
        }

        .settings-group input:focus,
        .settings-group textarea:focus,
        .settings-group select:focus {
            border-color: var(--accent);
        }

        .settings-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .settings-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.75rem;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            background: var(--bg-hover);
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.active { background: var(--accent); }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle.active::after { transform: translateX(18px); }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .conv-item {
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .conv-item:hover { background: var(--bg-tertiary); }
        .conv-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .conv-title {
            font-size: 0.875rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .conv-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .conv-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .conv-item:hover .conv-delete { opacity: 1; }
        .conv-delete:hover { color: var(--error); background: rgba(239, 68, 68, 0.1); }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-primary);
        }

        .chat-header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
        }

        .menu-btn:hover { background: var(--bg-tertiary); }

        .model-select {
            padding: 0.375rem 2rem 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            cursor: pointer;
            max-width: 280px;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            gap: 1rem;
        }

        .empty-state h2 { color: var(--text-primary); font-weight: 500; }
        .empty-state p { max-width: 400px; }

        .message {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            position: relative;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .message:hover { background: rgba(255,255,255,0.02); }
        .message.user { border-left-color: var(--accent); }
        .message.assistant { border-left-color: var(--accent-secondary); }
        .message.tool { border-left-color: var(--warning); }
        .message.system { border-left-color: var(--error); }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
            user-select: none;
        }

        .user .avatar { background: var(--accent); color: white; }
        .assistant .avatar { background: var(--accent-secondary); color: white; }
        .tool .avatar { background: var(--warning); color: black; }
        .system .avatar { background: var(--error); color: white; }

        .message-body {
            flex: 1;
            min-width: 0;
            padding-top: 0.25rem;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .message-author {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .message-content {
            color: var(--text-primary);
            line-height: 1.7;
            word-wrap: break-word;
        }

        .message-content p { margin-bottom: 0.75rem; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
        }

        .message-content p code {
            background: var(--bg-tertiary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.875em;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 1.5rem 0 0.75rem;
            font-weight: 600;
        }

        .message-content h1 { font-size: 1.5rem; }
        .message-content h2 { font-size: 1.25rem; }
        .message-content h3 { font-size: 1.125rem; }

        .message-content ul, .message-content ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .message-content li { margin: 0.25rem 0; }

        .message-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: var(--text-secondary);
        }

        .message-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .message-content a:hover { text-decoration: underline; }

        .thinking-block {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 0.75rem 0;
            overflow: hidden;
        }

        .thinking-block summary {
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            user-select: none;
        }

        .thinking-content {
            padding: 0 1rem 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            font-style: italic;
        }

        .tool-call {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            font-size: 0.875rem;
        }

        .tool-call-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tool-call-args {
            font-family: monospace;
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        .attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .attachment {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .attachment img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }

        .message-actions {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            display: none;
            gap: 0.25rem;
            background: rgba(9, 9, 11, 0.9);
            padding: 0.25rem;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .message:hover .message-actions { display: flex; }

        .msg-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.375rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .msg-action:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .edit-area {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9375rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
            margin-top: 0.5rem;
        }

        .edit-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-small {
            padding: 0.375rem 0.875rem;
            border-radius: 6px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--border); }

        /* Input Area */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            background: var(--bg-secondary);
        }

        .input-wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        .input-attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .pending-attachment {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 0.8125rem;
        }

        .pending-attachment img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 4px;
        }

        .remove-attach {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.125rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .remove-attach:hover { color: var(--error); }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 200px;
            font-family: inherit;
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
        }

        .input-tools {
            display: flex;
            gap: 0.5rem;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator {
            display: flex;
            gap: 0.4rem;
            padding: 0.5rem 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 { font-size: 1.1rem; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .modal-body { padding: 1.25rem; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
            .chat-container { padding: 1rem; }
            .message { padding: 1rem; }
            .message-actions { display: flex; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>⚡ OpenRouter</h2>
                <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            </div>

            <div class="settings-group">
                <label>API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." onchange="saveApiKey()">
            </div>

            <div class="settings-group">
                <label>System Prompt</label>
                <textarea id="systemPrompt" placeholder="You are a helpful assistant..." onchange="updateSystemPrompt()"></textarea>
            </div>

            <div class="settings-group">
                <div class="settings-row">
                    <div>
                        <label>Temp</label>
                        <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7" onchange="saveSettings()">
                    </div>
                    <div>
                        <label>Max Tokens</label>
                        <input type="number" id="maxTokens" min="1" max="128000" step="1" value="4096" onchange="saveSettings()">
                    </div>
                </div>
                <div class="toggle-row">
                    <span style="font-size: 0.875rem;">Enable Tools</span>
                    <div class="toggle" id="toolsToggle" onclick="toggleTools()"></div>
                </div>
            </div>

            <div class="conversations-list" id="conversationsList"></div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                    <select class="model-select" id="modelSelect" onchange="changeModel()">
                        <optgroup label="Anthropic">
                            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                            <option value="anthropic/claude-3.5-sonnet-20241022">Claude 3.5 Sonnet (Oct)</option>
                            <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
                            <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
                            <option value="anthropic/claude-3.7-sonnet">Claude 3.7 Sonnet</option>
                        </optgroup>
                        <optgroup label="OpenAI">
                            <option value="openai/gpt-4o">GPT-4o</option>
                            <option value="openai/gpt-4o-2024-11-20">GPT-4o (Nov)</option>
                            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                            <option value="openai/o1">o1</option>
                            <option value="openai/o1-mini">o1-mini</option>
                            <option value="openai/o3-mini">o3-mini</option>
                        </optgroup>
                        <optgroup label="Google">
                            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                            <option value="google/gemini-2.0-flash-thinking-exp">Gemini 2.0 Flash Thinking</option>
                            <option value="google/gemini-2.0-pro-exp">Gemini 2.0 Pro Exp</option>
                            <option value="google/gemini-1.5-pro">Gemini 1.5 Pro</option>
                            <option value="google/gemini-1.5-flash">Gemini 1.5 Flash</option>
                        </optgroup>
                        <optgroup label="Meta">
                            <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
                            <option value="meta-llama/llama-3.1-405b-instruct">Llama 3.1 405B</option>
                            <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
                            <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
                        </optgroup>
                        <optgroup label="DeepSeek">
                            <option value="deepseek/deepseek-chat">DeepSeek V3</option>
                            <option value="deepseek/deepseek-r1">DeepSeek R1</option>
                        </optgroup>
                        <optgroup label="Alibaba">

            <div class="chat-container" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <h2>Start a conversation</h2>
                    <p>Select a model, enter your API key, and send a message. You can attach images and text files.</p>
                </div>

            <div class="input-area">
                <div class="input-wrapper" id="dropZone">
                    <div class="input-attachments" id="inputAttachments"></div>

                        id="messageInput" 
                        placeholder="Message..." 
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <div class="input-footer">
                        <div class="input-tools">
                            <input type="file" id="imageInput" accept="image/*" multiple style="display: none" onchange="handleImageSelect(event)">
                            <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css" multiple style="display: none" onchange="handleFileSelect(event)">
                            <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Add Image">📷 Image</button>
                            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Add File">📎 File</button>
                        </div>

    <script>
        // State
        const state = {
            apiKey: localStorage.getItem('or_api_key') || '',
            conversations: JSON.parse(localStorage.getItem('or_conversations') || '[]'),
            currentId: localStorage.getItem('or_current_id') || null,
            isGenerating: false,
            toolsEnabled: localStorage.getItem('or_tools') === 'true',
            temperature: parseFloat(localStorage.getItem('or_temp')) || 0.7,
            maxTokens: parseInt(localStorage.getItem('or_max_tokens')) || 4096,
            pendingAttachments: [],
            editingMessageId: null
        };

        // Tools definition
        const availableTools = [
            {
                type: "function",
                function: {
                    name: "calculator",
                    description: "Evaluate a mathematical expression safely. Supports +, -, *, /, ^, parentheses, and standard math.",
                    parameters: {
                        type: "object",
                        properties: {
                            expression: { type: "string", description: "The math expression to evaluate, e.g. '2 + 2 * 5'" }
                        },
                        required: ["expression"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "get_current_time",
                    description: "Get the current date and time in the user's local timezone",
                    parameters: { type: "object", properties: {} }
                }
            },
            {
                type: "function",
                function: {
                    name: "random_number",
                    description: "Generate a random number within a range",
                    parameters: {
                        type: "object",
                        properties: {
                            min: { type: "number", description: "Minimum value (inclusive)" },
                            max: { type: "number", description: "Maximum value (inclusive)" }
                        },
                        required: ["min", "max"]
                    }
                }
            }
        ];

        // Init
        function init() {
            document.getElementById('apiKeyInput').value = state.apiKey;
            document.getElementById('temperature').value = state.temperature;
            document.getElementById('maxTokens').value = state.maxTokens;
            
            if (state.toolsEnabled) {
                document.getElementById('toolsToggle').classList.add('active');
            }

            if (!state.currentId || !state.conversations.find(c => c.id === state.currentId)) {
                createNewChat(false);
            } else {
                const conv = getCurrentConv();
                document.getElementById('modelSelect').value = conv.model;
                document.getElementById('systemPrompt').value = conv.systemPrompt || '';
                renderMessages();
            }

            renderConversations();
            setupDragDrop();
        }

        function generateId() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function getCurrentConv() {
            return state.conversations.find(c => c.id === state.currentId);
        }

        function save() {
            localStorage.setItem('or_api_key', state.apiKey);
            localStorage.setItem('or_conversations', JSON.stringify(state.conversations));
            localStorage.setItem('or_current_id', state.currentId);
            localStorage.setItem('or_tools', state.toolsEnabled);
            localStorage.setItem('or_temp', state.temperature);
            localStorage.setItem('or_max_tokens', state.maxTokens);
        }

        // Settings
        function saveApiKey() {
            state.apiKey = document.getElementById('apiKeyInput').value.trim();
            save();
        }

        function saveSettings() {
            state.temperature = parseFloat(document.getElementById('temperature').value) || 0.7;
            state.maxTokens = parseInt(document.getElementById('maxTokens').value) || 4096;
            save();
        }

        function updateSystemPrompt() {
            const conv = getCurrentConv();
            if (conv) {
                conv.systemPrompt = document.getElementById('systemPrompt').value;
                save();
            }
        }

        function toggleTools() {
            state.toolsEnabled = !state.toolsEnabled;
            document.getElementById('toolsToggle').classList.toggle('active');
            save();
        }

        function changeModel() {
            const conv = getCurrentConv();
            if (conv) {
                conv.model = document.getElementById('modelSelect').value;
                save();
            }
        }

        // Conversations
        function createNewChat(switchTo = true) {
            const id = generateId();
            const conv = {
                id,
                title: 'New Chat',
                messages: [],
                model: document.getElementById('modelSelect').value,
                systemPrompt: '',
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            state.conversations.unshift(conv);
            if (switchTo) {
                state.currentId = id;
                document.getElementById('systemPrompt').value = '';
                renderMessages();
            }
            save();
            renderConversations();
            return conv;
        }

        function switchConversation(id) {
            state.currentId = id;
            const conv = getCurrentConv();
            document.getElementById('modelSelect').value = conv.model;
            document.getElementById('systemPrompt').value = conv.systemPrompt || '';
            renderMessages();
            renderConversations();
            save();
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function deleteConversation(id, event) {
            event.stopPropagation();
            if (!confirm('Delete this conversation?')) return;
            state.conversations = state.conversations.filter(c => c.id !== id);
            if (state.currentId === id) {
                state.currentId = state.conversations[0]?.id || null;
                if (!state.currentId) createNewChat();
            }
            save();
            renderConversations();
            renderMessages();
        }

        function clearCurrentChat() {
            if (!confirm('Clear all messages in this chat?')) return;
            const conv = getCurrentConv();
            if (conv) {
                conv.messages = [];
                conv.title = 'New Chat';
                save();
                renderMessages();
            }
        }

        function renderConversations() {
            const list = document.getElementById('conversationsList');
            list.innerHTML = '';
            state.conversations.forEach(conv => {
                const div = document.createElement('div');
                div.className = 'conv-item' + (conv.id === state.currentId ? ' active' : '');
                div.onclick = () => switchConversation(conv.id);
                
                const title = document.createElement('span');
                title.className = 'conv-title';
                title.textContent = conv.title;
                
                const del = document.createElement('button');
                del.className = 'conv-delete';
                del.innerHTML = '✕';
                del.title = 'Delete';
                del.onclick = (e) => deleteConversation(conv.id, e);
                
                div.appendChild(title);
                div.appendChild(del);
                list.appendChild(div);
            });
        }

        function updateTitle(conv) {
            if (conv.title === 'New Chat' && conv.messages.length > 0) {
                const firstUser = conv.messages.find(m => m.role === 'user');
                if (firstUser) {
                    const text = firstUser.content.replace(/\s+/g, ' ').trim();
                    conv.title = text.slice(0, 35) + (text.length > 35 ? '...' : '');
                    save();
                    renderConversations();
                }
            }
        }

        // Messages
        function renderMessages() {
            const container = document.getElementById('chatContainer');
            const conv = getCurrentConv();
            
            if (!conv || conv.messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>Start a conversation</h2>
                        <p>Select a model, enter your API key, and send a message. You can attach images and text files.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            conv.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.id = `msg-${msg.id}`;
                
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = msg.role === 'user' ? 'You' : msg.role === 'assistant' ? 'AI' : msg.role === 'tool' ? '🔧' : '!';
                
                const body = document.createElement('div');
                body.className = 'message-body';
                
                const header = document.createElement('div');
                header.className = 'message-header';
                header.innerHTML = `
                    <span class="message-author">${msg.role === 'user' ? 'You' : msg.role === 'assistant' ? 'Assistant' : msg.role === 'tool' ? 'Tool' : 'System'}</span>
                    <span class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                `;
                
                const content = document.createElement('div');
                content.className = 'message-content';
                
                if (state.editingMessageId === msg.id && msg.role === 'user') {
                    // Edit mode
                    const textarea = document.createElement('textarea');
                    textarea.className = 'edit-area';
                    textarea.value = msg.content;
                    textarea.id = `edit-${msg.id}`;
                    
                    const actions = document.createElement('div');
                    actions.className = 'edit-actions';
                    actions.innerHTML = `
                        <button class="btn-small btn-primary" onclick="saveEdit('${msg.id}')">Save & Regenerate</button>
                        <button class="btn-small btn-secondary" onclick="cancelEdit()">Cancel</button>
                    `;
                    
                    body.appendChild(header);
                    body.appendChild(textarea);
                    body.appendChild(actions);
                } else {
                    // View mode
                    if (msg.toolCalls) {
                        msg.toolCalls.forEach(tc => {
                            const toolDiv = document.createElement('div');
                            toolDiv.className = 'tool-call';
                            toolDiv.innerHTML = `
                                <div class="tool-call-header">🔧 ${tc.function.name}</div>
                                <div class="tool-call-args">${escapeHtml(JSON.stringify(JSON.parse(tc.function.arguments), null, 2))}</div>
                            `;
                            content.appendChild(toolDiv);
                        });
                    }
                    
                    if (msg.content) {
                        const parsed = parseMarkdown(msg.content);
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = parsed;
                        while (tempDiv.firstChild) {
                            content.appendChild(tempDiv.firstChild);
                        }
                    }
                    
                    if (msg.attachments && msg.attachments.length > 0) {
                        const attDiv = document.createElement('div');
                        attDiv.className = 'attachments';
                        msg.attachments.forEach(att => {
                            const chip = document.createElement('div');
                            chip.className = 'attachment';
                            if (att.type === 'image') {
                                chip.innerHTML = `<img src="${att.data}" alt="${att.name}"> <span>${att.name}</span>`;
                            } else {
                                chip.innerHTML = `<span>📄 ${att.name}</span>`;
                            }
                            attDiv.appendChild(chip);
                        });
                        content.appendChild(attDiv);
                    }
                    
                    // Message actions
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';
                    
                    if (msg.role === 'user') {
                        actions.innerHTML += `<button class="msg-action" onclick="startEdit('${msg.id}')" title="Edit">✎ Edit</button>`;
                    }
                    if (msg.role === 'assistant') {
                        actions.innerHTML += `<button class="msg-action" onclick="regenerateMessage('${msg.id}')" title="Regenerate">↻ Regen</button>`;
                        actions.innerHTML += `<button class="msg-action" onclick="copyMessage('${msg.id}')" title="Copy">⎘ Copy</button>`;
                    }
                    actions.innerHTML += `<button class="msg-action" onclick="deleteMessage('${msg.id}')" title="Delete">✕ Del</button>`;
                    
                    body.appendChild(header);
                    body.appendChild(content);
                    div.appendChild(actions);
                }
                
                div.appendChild(avatar);
                div.appendChild(body);
                container.appendChild(div);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        function startEdit(msgId) {
            state.editingMessageId = msgId;
            renderMessages();
            const textarea = document.getElementById(`edit-${msgId}`);
            if (textarea) {
                textarea.focus();
                textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            }
        }

        function cancelEdit() {
            state.editingMessageId = null;
            renderMessages();
        }

        function saveEdit(msgId) {
            const conv = getCurrentConv();
            const textarea = document.getElementById(`edit-${msgId}`);
            const newContent = textarea.value.trim();
            if (!newContent || !conv) return;
            
            const idx = conv.messages.findIndex(m => m.id === msgId);
            if (idx === -1) return;
            
            conv.messages[idx].content = newContent;
            conv.messages = conv.messages.slice(0, idx + 1);
            state.editingMessageId = null;
            
            save();
            renderMessages();
            processConversation();
        }

        function regenerateMessage(msgId) {
            const conv = getCurrentConv();
            if (!conv) return;
            
            const idx = conv.messages.findIndex(m => m.id === msgId);
            if (idx === -1 || conv.messages[idx].role !== 'assistant') return;
            
            conv.messages = conv.messages.slice(0, idx);
            save();
            renderMessages();
            processConversation();
        }

        function deleteMessage(msgId) {
            const conv = getCurrentConv();
            if (!conv) return;
            
            const idx = conv.messages.findIndex(m => m.id === msgId);
            if (idx === -1) return;
            
            conv.messages = conv.messages.slice(0, idx);
            save();
            renderMessages();
        }

        function copyMessage(msgId) {
            const conv = getCurrentConv();
            const msg = conv.messages.find(m => m.id === msgId);
            if (msg) {
                navigator.clipboard.writeText(msg.content).then(() => {
                    showToast('Copied to clipboard');
                });
            }
        }

        // Markdown parser
        function parseMarkdown(text) {
            let html = escapeHtml(text);
            
            // Extract <think> blocks first
            html = html.replace(/<think>([\s\S]*?)<\/think>/g, (match, thinking) => {
                return `<details class="thinking-block"><summary>🧠 Thinking</summary><div class="thinking-content">${escapeHtml(thinking)}</div></details>`;
            });
            
            // Code blocks
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Bold & Italic
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            
            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            
            // Lists (simple)
            const lines = html.split('\n');
            let result = [];
            let inList = false;
            let listType = null;
            
            for (let line of lines) {
                const ulMatch = line.match(/^[\-\*] (.+)$/);
                const olMatch = line.match(/^(\d+)\. (.+)$/);
                
                if (ulMatch) {
                    if (!inList || listType !== 'ul') {
                        if (inList) result.push(`</${listType}>`);
                        result.push('<ul>');
                        inList = true;
                        listType = 'ul';
                    }
                    result.push(`<li>${ulMatch[1]}</li>`);
                } else if (olMatch) {
                    if (!inList || listType !== 'ol') {
                        if (inList) result.push(`</${listType}>`);
                        result.push('<ol>');
                        inList = true;
                        listType = 'ol';
                    }
                    result.push(`<li>${olMatch[2]}</li>`);
                } else {
                    if (inList) {
                        result.push(`</${listType}>`);
                        inList = false;
                        listType = null;
                    }
                    result.push(line);
                }
            }
            if (inList) result.push(`</${listType}>`);
            html = result.join('\n');
            
            // Paragraphs
            const blocks = html.split(/\n{2,}/);
            html = blocks.map(block => {
                const trimmed = block.trim();
                if (!trimmed) return '';
                if (trimmed.startsWith('<') && !trimmed.startsWith('<br>')) return block;
                return `<p>${block.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');
            
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Attachments
        function handleImageSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                if (!file.type.startsWith('image/')) return;
                resizeImage(file, (dataUrl) => {
                    state.pendingAttachments.push({ type: 'image', name: file.name, data: dataUrl });
                    renderPendingAttachments();
                });
            });
            event.target.value = '';
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.pendingAttachments.push({ type: 'file', name: file.name, content: e.target.result });
                    renderPendingAttachments();
                };
                reader.readAsText(file);
            });
            event.target.value = '';
        }

        function resizeImage(file, callback) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let { width, height } = img;
                const maxDim = 1200;
                if (width > maxDim || height > maxDim) {
                    if (width > height) {
                        height *= maxDim / width;
                        width = maxDim;
                    } else {
                        width *= maxDim / height;
                        height = maxDim;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                URL.revokeObjectURL(url);
                callback(dataUrl);
            };
            img.src = url;
        }

        function renderPendingAttachments() {
            const container = document.getElementById('inputAttachments');
            container.innerHTML = '';
            state.pendingAttachments.forEach((att, idx) => {
                const div = document.createElement('div');
                div.className = 'pending-attachment';
                if (att.type === 'image') {
                    div.innerHTML = `<img src="${att.data}"> <span>${att.name}</span>`;
                } else {
                    div.innerHTML = `<span>📄 ${att.name}</span>`;
                }
                const remove = document.createElement('button');
                remove.className = 'remove-attach';
                remove.innerHTML = '✕';
                remove.onclick = () => {
                    state.pendingAttachments.splice(idx, 1);
                    renderPendingAttachments();
                };
                div.appendChild(remove);
                container.appendChild(div);
            });
        }

        function setupDragDrop() {
            const zone = document.getElementById('dropZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                zone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            zone.addEventListener('drop', (e) => {
                const files = Array.from(e.dataTransfer.files);
                files.forEach(file => {
                    if (file.type.startsWith('image/')) {
                        resizeImage(file, (dataUrl) => {
                            state.pendingAttachments.push({ type: 'image', name: file.name, data: dataUrl });
                            renderPendingAttachments();
                        });
                    } else if (file.type === 'text/plain' || file.name.match(/\.(txt|md|json|csv|js|py|html|css)$/)) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            state.pendingAttachments.push({ type: 'file', name: file.name, content: e.target.result });
                            renderPendingAttachments();
                        };
                        reader.readAsText(file);
                    }
                });
            });
        }

        // Sending
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            if (e.key === 'Escape') {
                cancelEdit();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content && state.pendingAttachments.length === 0) return;
            if (!state.apiKey) {
                showToast('Please enter your API key in the sidebar', true);
                return;
            }
            
            const conv = getCurrentConv();
            if (!conv) return;
            
            // Build content with file attachments appended
            let finalContent = content;
            const textFiles = state.pendingAttachments.filter(a => a.type === 'file');
            if (textFiles.length > 0) {
                textFiles.forEach(file => {
                    finalContent += `\n\n--- Content of ${file.name} ---\n${file.content}\n--- End of ${file.name} ---`;
                });
            }
            
            const images = state.pendingAttachments.filter(a => a.type === 'image');
            const msgAttachments = images.map(img => ({ type: 'image', name: img.name, data: img.data }));
            
            const userMsg = {
                id: generateId(),
                role: 'user',
                content: finalContent,
                attachments: msgAttachments,
                timestamp: Date.now()
            };
            
            conv.messages.push(userMsg);
            conv.updatedAt = Date.now();
            
            input.value = '';
            input.style.height = 'auto';
            state.pendingAttachments = [];
            renderPendingAttachments();
            
            save();
            updateTitle(conv);
            renderMessages();
            await processConversation();
        }

        async function processConversation() {
            const conv = getCurrentConv();
            if (!conv) return;
            
            state.isGenerating = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();
            
            let attempts = 0;
            const maxAttempts = 5;
            
            try {
                while (attempts < maxAttempts) {
                    attempts++;
                    
                    const body = buildRequestBody(conv);
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${state.apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'OpenRouter Pro Chat'
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error?.message || `HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const choice = data.choices[0];
                    
                    removeTyping();
                    
                    if (choice.finish_reason === 'tool_calls' || choice.message?.tool_calls) {
                        // Add assistant message with tool calls
                        conv.messages.push({
                            id: generateId(),
                            role: 'assistant',
                            content: choice.message.content || '',
                            toolCalls: choice.message.tool_calls,
                            timestamp: Date.now()
                        });
                        
                        // Execute tools
                        for (const toolCall of choice.message.tool_calls) {
                            const result = await executeTool(
                                toolCall.function.name,
                                JSON.parse(toolCall.function.arguments)
                            );
                            conv.messages.push({
                                id: generateId(),
                                role: 'tool',
                                tool_call_id: toolCall.id,
                                name: toolCall.function.name,
                                content: String(result),
                                timestamp: Date.now()
                            });
                        }
                        
                        renderMessages();
                        showTyping();
                        // Continue loop to send results back
                    } else {
                        // Normal response
                        conv.messages.push({
                            id: generateId(),
                            role: 'assistant',
                            content: choice.message.content,
                            timestamp: Date.now()
                        });
                        break;
                    }
                }
            } catch (err) {
                removeTyping();
                conv.messages.push({
                    id: generateId(),
                    role: 'system',
                    content: `Error: ${err.message}`,
                    timestamp: Date.now()
                });
                showToast(err.message, true);
            } finally {
                state.isGenerating = false;
                document.getElementById('sendBtn').disabled = false;
                removeTyping();
                save();
                renderMessages();
            }
        }

        function buildRequestBody(conv) {
            const messages = [];
            if (conv.systemPrompt?.trim()) {
                messages.push({ role: 'system', content: conv.systemPrompt.trim() });
            }
            
            for (const msg of conv.messages) {
                if (msg.role === 'tool') {
                    messages.push({
                        role: 'tool',
                        tool_call_id: msg.tool_call_id,
                        content: msg.content
                    });
                } else if (msg.role === 'assistant' && msg.toolCalls) {
                    messages.push({
                        role: 'assistant',
                        content: msg.content,
                        tool_calls: msg.toolCalls
                    });
                } else if (msg.role === 'user' && msg.attachments?.length > 0) {
                    const content = [{ type: 'text', text: msg.content }];
                    for (const att of msg.attachments) {
                        if (att.type === 'image') {
                            content.push({
                                type: 'image_url',
                                image_url: { url: att.data }
                            });
                        }
                    }
                    messages.push({ role: 'user', content });
                } else {
                    messages.push({ role: msg.role, content: msg.content });
                }
            }
            
            return {
                model: conv.model,
                messages: messages,
                temperature: state.temperature,
                max_tokens: state.maxTokens,
                ...(state.toolsEnabled && { tools: availableTools, tool_choice: 'auto' })
            };
        }

        function executeTool(name, args) {
            switch (name) {
                case 'calculator':
                    return safeCalculate(args.expression);
                case 'get_current_time':
                    return new Date().toLocaleString();
                case 'random_number':
                    return Math.floor(Math.random() * (args.max - args.min + 1)) + args.min;
                default:
                    return `Unknown tool: ${name}`;
            }
        }

        function safeCalculate(expr) {
            // Sanitize: only allow numbers, operators, parentheses, decimals, spaces
            const clean = expr.replace(/\s+/g, '');
            if (!/^[\d+\-*/().^]+$/.test(clean)) {
                throw new Error('Invalid characters in expression');
            }
            // Replace ^ with ** for JS
            const jsExpr = clean.replace(/\^/g, '**');
            // Use Function with strict mode for relative safety
            return new Function('"use strict"; return (' + jsExpr + ')')();
        }

        function showTyping() {
            if (document.getElementById('typingIndicator')) return;
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="avatar">AI</div>
                <div class="message-body">
                    <div class="message-header">
                        <span class="message-author">Assistant</span>
                    </div>
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // UI Helpers
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showToast(message, isError = false) {
            // Simple toast implementation
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? 'var(--error)' : 'var(--accent)'};
                color: white;
                padding: 0.75rem 1.5rem;
                border-radius: 8px;
                font-size: 0.875rem;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function exportChat() {
            const conv = getCurrentConv();
            if (!conv || conv.messages.length === 0) {
                showToast('No messages to export', true);
                return;
            }
            
            let markdown = `# ${conv.title}\n\n**Model:** ${conv.model}\n**Date:** ${new Date(conv.createdAt).toLocaleString()}\n\n---\n\n`;
            conv.messages.forEach(msg => {
                const role = msg.role === 'user' ? 'You' : msg.role === 'assistant' ? 'Assistant' : 'System';
                markdown += `## ${role}\n\n${msg.content}\n\n`;
            });
            
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-${conv.id}.md`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Chat exported');
        }

        // Initialize
        init();
    </script>
</body>
</html>

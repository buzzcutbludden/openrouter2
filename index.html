<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-right: auto;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            font-weight: 600;
        }

        input[type="password"],
        input[type="text"],
        select {
            background: #252525;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus,
        select:focus {
            border-color: #6366f1;
        }

        input[type="password"] {
            width: 200px;
        }

        select {
            width: 180px;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user .avatar {
            background: #6366f1;
            color: white;
        }

        .assistant .avatar {
            background: #059669;
            color: white;
        }

        .system .avatar {
            background: #d97706;
            color: white;
        }

        .message-content {
            flex: 1;
            padding-top: 0.25rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-content p {
            margin-bottom: 0.75rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid #333;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
        }

        .message-content p code {
            background: #252525;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .input-area {
            border-top: 1px solid #333;
            background: #1a1a1a;
            padding: 1.5rem;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            resize: none;
            outline: none;
            min-height: 52px;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #6366f1;
            background: #2a2a2a;
        }

        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover:not(:disabled) {
            background: #5558e0;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: center;
            height: 1.5rem;
        }

        .error {
            color: #ef4444;
        }

        .typing {
            display: inline-flex;
            gap: 0.3rem;
            align-items: center;
            padding: 0.5rem 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 20vh;
        }

        .empty-state h2 {
            color: #888;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9375rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpenRouter Chat</h1>
        <div class="input-group">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="sk-or-v1-..." />
        </div>
        <div class="input-group">
            <label for="model">Model</label>
            <select id="model">
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
                <option value="google/gemini-flash-1.5">Gemini Flash 1.5</option>
                <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
                <option value="nousresearch/hermes-3-llama-3.1-405b">Hermes 3 405B</option>
                <option value="custom">Custom...</option>
            </select>
        </div>
        <div class="input-group" id="customModelGroup" style="display: none;">
            <input type="text" id="customModel" placeholder="provider/model-name" />
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state">
            <h2>Welcome to OpenRouter</h2>
            <p>Enter your API key above and start chatting</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea 
                id="messageInput" 
                placeholder="Type your message..." 
                rows="1"
                onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
            ></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('model');
        const customModelGroup = document.getElementById('customModelGroup');
        const customModelInput = document.getElementById('customModel');
        const statusEl = document.getElementById('status');

        let messages = [];
        let isGenerating = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Show/hide custom model input
        modelSelect.addEventListener('change', () => {
            if (modelSelect.value === 'custom') {
                customModelGroup.style.display = 'flex';
            } else {
                customModelGroup.style.display = 'none';
            }
        });

        function getModel() {
            if (modelSelect.value === 'custom') {
                return customModelInput.value.trim();
            }
            return modelSelect.value;
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'You' : role === 'system' ? '!' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatContent(content);
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatContainer.appendChild(msgDiv);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return contentDiv;
        }

        function formatContent(text) {
            // Escape HTML
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Code blocks
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        function showTyping() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (isError ? ' error' : '');
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const model = getModel();

            if (!content) return;
            if (!apiKey) {
                setStatus('Please enter your OpenRouter API key', true);
                apiKeyInput.focus();
                return;
            }
            if (!model) {
                setStatus('Please select or enter a model', true);
                return;
            }

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Remove empty state if present
            const emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Add user message
            addMessage('user', content);
            messages.push({ role: 'user', content });

            isGenerating = true;
            sendBtn.disabled = true;
            showTyping();
            setStatus('Sending...');

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'OpenRouter Chat Interface'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                removeTyping();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const assistantMsg = data.choices[0].message.content;
                
                addMessage('assistant', assistantMsg);
                messages.push({ role: 'assistant', content: assistantMsg });
                setStatus('');
            } catch (err) {
                removeTyping();
                addMessage('system', `Error: ${err.message}`);
                setStatus(err.message, true);
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
